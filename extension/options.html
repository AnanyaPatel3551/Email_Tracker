<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gmail Email Tracker Options</title>
  <style>
    :root {
      --bg-color: #020617;
      --card-bg: #0f172a;
      --border-color: #1e293b;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --error: #f43f5e;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 520px;
      padding: 2.5rem;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 1.25rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .header {
      margin-bottom: 2rem;
    }

    .title {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0 0 0.5rem 0;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin: 0;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 0.75rem 1rem;
      background-color: #020617;
      border: 1px solid var(--border-color);
      border-radius: 0.75rem;
      color: #38bdf8;
      font-family: monospace;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
    }

    button {
      width: 100%;
      padding: 0.875rem 1.25rem;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      color: white;
      font-size: 0.875rem;
      font-weight: 700;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
      transition: transform 0.15s, opacity 0.15s;
    }

    button:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .status {
      display: none;
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      font-size: 0.8125rem;
      line-height: 1.4;
    }

    .status.success {
      background-color: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #34d399;
    }

    .status.error {
      background-color: rgba(244, 63, 94, 0.1);
      border: 1px solid rgba(244, 63, 94, 0.3);
      color: #fb7185;
    }

    .status.warning {
      background-color: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      color: #fbbf24;
    }

    .info-box {
      margin-top: 2rem;
      padding: 1rem;
      background-color: #020617;
      border: 1px solid var(--border-color);
      border-radius: 0.75rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .info-box code {
      color: #818cf8;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">Email Tracker Settings</h1>
      <p class="subtitle">Connect your Chrome Extension to your Antigravity Email Tracker account by pasting your API key below.</p>
    </div>

    <div class="form-group">
      <label for="apiKeyInput">Your API Key (from Dashboard Settings)</label>
      <input id="apiKeyInput" type="text" placeholder="et_live_..." autocomplete="off" spellcheck="false" />
    </div>

    <button id="saveBtn">Save Settings</button>

    <div id="statusMsg" class="status"></div>

    <div class="info-box">
      <strong>Where do I get my API key?</strong><br/>
      Log into your Email Tracker Dashboard (<code>http://localhost:5173</code>), go to <strong>Settings</strong>, and click <strong>Generate New API Key</strong>. Copy the key and paste it above.
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
